<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>加载进度条</title>
  <style>
    .out {
      width: 500px;
      height: 100px;
      overflow: hidden;
    }

    .line {
      width: 64px;
      height: 2px;
      /* background: linear-gradient(to right,rgba(24,144,255,0) 0,#1890ff); */
      background: linear-gradient(90deg,rgba(24,144,255,0) 0,#1890ff);
      animation: move 3s ease-in-out 0s infinite;
    }

    @keyframes move {
      0%, 25% {
        transform: translateX(-64px);
      }
      75%, to {
        transform: translateX(564px);
      }
    }

    .infinite {
      height: 2px;
      width: 0px;
      background: red;
      animation: ani 2s linear infinite;
    }

    .alternate {
      height: 2px;
      width: 0px;
      background: blue;
      animation: ani 2s linear infinite alternate;
    }

    @keyframes ani {
      to {
        width: 100%;
      }
    }

    .loading {
      height: 2px;
      width: 100%;
      background: #1890ff;
      transform: scaleX(0);
      transform-origin: left;
      animation: ani2 2s linear infinite;
    }

    .loading2 {
      height: 2px;
      width: 100%;
      background: linear-gradient(to right, #e6f4ff, #1890ff);
      transform: scaleX(0);
      transform-origin: left;
      animation: ani2 2s linear infinite;
    }

    @keyframes ani2 {
      to {
        transform: scaleX(1);
      }
    }
  </style>
</head>
<body>
  <div class="out">
    <div class="line"></div>
  </div>
  <div class="infinite"></div>
  <div class="alternate" style="margin-top: 10px;"></div>
  <div class="loading" style="margin-top: 10px;"></div>
  <div class="loading2" style="margin-top: 10px;"></div>
</body>
</html>
