<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no">
    <title>加载进度条</title>
    <style>
      .progressBox {
        position: relative;
        z-index: 10;
        width: 100%;
        height: 3px;
        margin-bottom: 10px;
        /* background: #F95F67; */
        background: #00CF95;
      }

      .progressBar {
        position: absolute;
        top: 0;
        left: 0;
        height: 3px;
        animation: vary 2s linear infinite;
        will-change: transform, background, width;
      }

      @keyframes vary {
        0% {
          left: 0;
          width: 0;
          background: linear-gradient(
            to right, rgba(77, 100, 255, 90%), rgba(77, 100, 255, 90%)
          );
        }

        5% {
          width: 5%;
          transform: translateX(0) scaleX(1);
        }

        10% {
          background: linear-gradient(
            to right, rgba(77, 227, 255, 10%), rgba(77, 227, 255, 90%)
          );
          transform: translateX(0) scaleX(2);
        }

        30% {
          background: linear-gradient(
            to right, transparent, rgba(77, 227, 255, 10%) 30%, rgba(77, 227, 255, 90%)
          );
          transform: translateX(100%) scaleX(5);
        }

        60% {
          background: linear-gradient(
            to right, transparent, rgba(181, 101, 255, 10%) 30%, rgba(181, 101, 255, 90%)
          );
        }

        80% {
          background: linear-gradient(
            to right, transparent, rgba(17, 225, 197, 10%) 30%, rgba(17, 225, 197, 90%)
          );
        }

        100% {
          width: 5%;
          background: linear-gradient(
            to right, transparent, rgba(77, 102, 255, 10%) 30%, rgba(77, 102, 255, 90%)
          );
          transform: translateX(1650%) scaleX(6);
        }
      }

    </style>
  </head>
  <body>
    <div class="progressBox">
      <div class="progressBar"></div>
    </div>
  </body>
</html>
