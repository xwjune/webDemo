<html>
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no"
    />
    <title>航班搜索【支持指令】</title>
  </head>
  <body>
    <script>
      /**
       * 指令基类
       * 所有指令继承此类，子类实现 match() 和 execute() 方法
       */
      class Command {
        constructor(code, priority, description) {
          this.code = code;
          this.priority = priority;
          this.description = description;
        }
        /** @param {string} code - 输入指令码 @returns {boolean} */
        match(code) {
          return false;
        }
        /** @param {Object} item - 数据项 @param {string} code - 原始指令码 @returns {boolean} */
        execute(item, code) {
          return false;
        }
      }

      // --- 1. 特殊指令 (优先级 100 - 最高) ---

      /**
       * 国际航班
       */
      class IntlCommand extends Command {
        constructor() {
          super("INTL", 100, "国际航班");
        }
        match(code) {
          return code === this.code;
        }
        execute(item) {
          return item.isInternational === true;
        }
      }

      /**
       * 取消航班
       */
      class CnlCommand extends Command {
        constructor() {
          super("CNL", 100, "取消航班");
        }
        match(code) {
          return code === this.code;
        }
        execute(item) {
          return item.status === "CANCELLED";
        }
      }

      // --- 2. 动态指令 (优先级 50 - 中等) ---

      /**
       * 机场筛选
       * 支持格式:
       *   SHA   — 出发或到达包含 SHA
       *   SHA-  — 从 SHA 出发
       *   -SHA  — 到达 SHA
       */
      class AirportCommand extends Command {
        static PATTERN = /^(-?)([A-Z]{3})(-?)$/i;
        constructor() {
          super("AIRPORT", 50, "机场筛选");
        }
        match(code) {
          return AirportCommand.PATTERN.test(code);
        }
        execute(item, code) {
          const airportCode = code.replace(/-/g, "");
          // 后缀 - 表示出发，前缀 - 表示到达，无前后缀表示双向
          let direction = "BOTH";
          if (code.endsWith("-")) direction = "DEPARTURE";
          else if (code.startsWith("-")) direction = "ARRIVAL";

          if (direction === "BOTH") return item.departure === airportCode || item.arrival === airportCode;
          if (direction === "DEPARTURE") return item.departure === airportCode;
          if (direction === "ARRIVAL") return item.arrival === airportCode;
          return false;
        }
      }

      /**
       * 时长筛选
       * 支持格式: DUR<3, DUR>3, DUR=3, DUR<=3, DUR>=3
       */
      class DurationCommand extends Command {
        static PATTERN = /^DUR(>=|<=|>|<|=)(\d+(\.\d+)?)$/i;
        constructor() {
          super("DUR", 50, "时长筛选 (如 DUR<3, DUR>=5)");
        }
        match(code) {
          return DurationCommand.PATTERN.test(code);
        }
        execute(item, code) {
          const [, operator, value] = code.match(DurationCommand.PATTERN);
          const limit = parseFloat(value);
          switch (operator) {
            case ">":  return item.duration > limit;
            case ">=": return item.duration >= limit;
            case "<":  return item.duration < limit;
            case "<=": return item.duration <= limit;
            case "=":  return item.duration === limit;
            default:   return false;
          }
        }
      }

      /**
       * 飞机号搜索
       * 支持格式: B123A, B-123A, 123A
       * 匹配规则: 飞机号以 B- 开头的去掉 B- 比较，否则去掉 B 比较
       */
      class AircraftNoCommand extends Command {
        static PATTERN = /^(B-?[A-Z0-9]{4,5}|[A-Z0-9]{4,5})$/i;
        constructor() {
          super("REGNO", 50, "飞机号搜索 (如 B123A, 123A)");
        }
        match(code) {
          return AircraftNoCommand.PATTERN.test(code);
        }
        execute(item, code) {
          const normalize = (s) => {
            const cleaned = s.replace(/-/g, "").toUpperCase();
            return cleaned.startsWith("B") ? cleaned.substring(1) : cleaned;
          };
          const target = normalize(item.regNo || "");
          const query = normalize(code);
          return target === query;
        }
      }

      // --- 3. 兜底指令 (优先级 10 - 最低) ---

      /**
       * 航班号搜索
       * 支持格式: MU1234, 1234
       */
      class FlightNoCommand extends Command {
        static PATTERN = /^([A-Z]{2})?(\d{3,4})$/i;
        constructor() {
          super("FLIGHTNO", 10, "航班号搜索 (如 MU1234, 1234)");
        }
        match(code) {
          return FlightNoCommand.PATTERN.test(code);
        }
        execute(item, code) {
          return (item.flightNo || "").includes(code);
        }
      }

      /**
       * 航班搜索引擎
       */
      class FlightSearchEngine {
        /**
         * @param {'single'|'any'} matchMode - 指令匹配模式
         *   single: 仅取优先级最高的命中指令
         *   any: 多个指令命中时，任一指令匹配即算命中（合集）
         */
        constructor(matchMode = "single") {
          this.commands = [];
          this.matchMode = matchMode;
        }

        /**
         * 注册指令实例
         */
        registerCommand(command) {
          this.commands.push(command);
        }

        /**
         * 切换匹配模式
         * @param {'single'|'any'} mode
         */
        setMatchMode(mode) {
          this.matchMode = mode;
        }

        /**
         * 将搜索关键词拆解为嵌套逻辑结构
         * 返回格式: [[condition, ...], ...]
         *   外层数组元素之间为 OR 关系（逗号分隔）
         *   内层数组元素之间为 AND 关系（星号分隔）
         *   前缀 ! 表示取反
         * 每个 condition 包含: { commands, code, negate }
         *   commands: 命中的指令数组（single 模式最多 1 个，any 模式可能有多个）
         */
        tokenize(keyword) {
          const sorted = [...this.commands].sort(
            (a, b) => b.priority - a.priority,
          );

          const orGroups = keyword.split(",");
          return orGroups.map((group) => {
            const andTokens = group.split("*");
            return andTokens.map((token) => {
              const isNegation = token.startsWith("!");
              const rawCode = isNegation ? token.substring(1) : token;

              const commands =
                this.matchMode === "single"
                  ? (() => {
                      const m = sorted.find((cmd) => cmd.match(rawCode));
                      return m ? [m] : [];
                    })()
                  : sorted.filter((cmd) => cmd.match(rawCode));

              return {
                commands,
                code: rawCode,
                negate: isNegation,
              };
            });
          });
        }

        /**
         * 判断数据项是否匹配 token 结构
         * 输入: item + tokenize 输出的二维逻辑数组
         *   single 模式: 单指令判定
         *   any 模式: 多个命中指令任一通过即匹配
         */
        hit(item, tokens) {
          return tokens.some((andGroup) => {
            return andGroup.every((condition) => {
              const { commands, code, negate } = condition;
              if (!commands.length) return false;
              const result = commands.some((cmd) => cmd.execute(item, code));
              return negate ? !result : result;
            });
          });
        }

        /**
         * 主搜索函数
         * 流程: 输入校验 → 标准化 → 词法分析(拆解逻辑结构) → 逐条匹配 → 返回结果
         */
        search(keyword, data, options = {}) {
          // 空关键词直接返回空数组
          if (!keyword || typeof keyword !== "string" || !keyword.trim()) {
            return { flightList: [] };
          }

          // 标准化: 去首尾空格并转大写
          const cleanKeyword = keyword.trim().toUpperCase();
          // 词法分析: 将关键词拆解为嵌套逻辑结构 [[condition, ...], ...]
          const tokens = this.tokenize(cleanKeyword);
          // 逐条匹配: 对每条数据执行条件树判定
          const filterItem = (item) => this.hit(item, tokens);

          return {
            flightList: data.filter(filterItem),
          };
        }
      }

      // 初始化引擎
      const engine = new FlightSearchEngine();

      // 指令注册
      engine.registerCommand(new IntlCommand());
      engine.registerCommand(new CnlCommand());
      engine.registerCommand(new AirportCommand());
      engine.registerCommand(new DurationCommand());
      engine.registerCommand(new AircraftNoCommand());
      engine.registerCommand(new FlightNoCommand());

      const mockData = [
        { id: "1", flightNo: "MU5102", departure: "PVG", arrival: "NRT", regNo: "B5926", duration: 3, status: "SCHEDULED", isInternational: true },
        { id: "2", flightNo: "FM9101", departure: "SHA", arrival: "PEK", regNo: "B5523", duration: 2.5, status: "CANCELLED", isInternational: false },
        { id: "3", flightNo: "CA1234", departure: "PEK", arrival: "LAX", regNo: "B0003", duration: 12, status: "SCHEDULED", isInternational: true },
        { id: "4", flightNo: "HO1111", departure: "SHA", arrival: "HKG", regNo: "B0004", duration: 2, status: "CANCELLED", isInternational: false },
        { id: "5", flightNo: "FM9313", departure: "SHA", arrival: "CAN", regNo: "B5969", duration: 2, status: "SCHEDULED", isInternational: false },
        { id: "6", flightNo: "MU5969", departure: "KMG", arrival: "ZAT", regNo: "B6142", duration: 1.5, status: "SCHEDULED", isInternational: false },
        { id: "7", flightNo: "FM9331", departure: "SHA", arrival: "SZX", regNo: "B5969", duration: 2.5, status: "SCHEDULED", isInternational: false },
      ];

      const testList = [
        // --- single 模式 ---
        { keyword: "INTL", expected: ["1", "3"], mode: "single" },
        { keyword: "CNL", expected: ["2", "4"], mode: "single" },
        { keyword: "SHA", expected: ["2", "4", "5", "7"], mode: "single" },
        { keyword: "DUR>3", expected: ["3"], mode: "single" },
        { keyword: "MU5102", expected: ["1"], mode: "single" },
        { keyword: "B5969", expected: ["5", "7"], mode: "single" },
        { keyword: "5969", expected: ["5", "7"], mode: "single" },
        { keyword: "!CNL", expected: ["1", "3", "5", "6", "7"], mode: "single" },
        { keyword: "SHA-,PVG-", expected: ["1", "2", "4", "5", "7"], mode: "single" },
        { keyword: "INTL*DUR>10", expected: ["3"], mode: "single" },
        { keyword: "CNL*SHA-", expected: ["2", "4"], mode: "single" },
        { keyword: "CNL*SHA-,INTL", expected: ["1", "2", "3","4"], mode: "single" },
        { keyword: "!CNL*PEK-*INTL", expected: ["3"], mode: "single" },
        { keyword: "B6142,MU5102", expected: ["1", "6"], mode: "single" },
        { keyword: "CNL**SHA-", expected: [], mode: "single", comment: '连续星号'  },
        { keyword: "SHA-,,PVG-", expected: ["1", "2", "4", "5", "7"], mode: "single", comment: '连续逗号' },
        // --- any 模式 ---
        { keyword: "5969", expected: ["5", "6", "7"], mode: "any", comment: "AircraftNo: id5,7 | FlightNo: id6" },
        { keyword: "B6142", expected: ["6"], mode: "any", comment: "AircraftNo: id6 | FlightNo: 无命中" },
      ];

      testList.forEach((test) => {
        engine.setMatchMode(test.mode);
        const result = engine.search(test.keyword, mockData);
        const actual = result.flightList.map((f) => f.id);
        const pass = JSON.stringify(actual) === JSON.stringify(test.expected);
        const label = test.comment ? ` (${test.comment})` : "";
        console.log(
          `${pass ? "✓" : "✗"} [${test.mode}] "${test.keyword}" → 实际: [${actual}] 预期: [${test.expected}]${label}`,
        );
      });
    </script>
  </body>
</html>
