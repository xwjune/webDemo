<html>
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no"
    />
    <title>指令搜索【根据优先级匹配】</title>
  </head>
  <body>
    <script>
      /**
       * 指令基类
       * 所有指令继承此类，子类实现 match() 和 execute() 方法
       */
      class Command {
        constructor(priority) {
          this.priority = priority;
        }
        /** @param {string} code - 输入指令码 @returns {boolean} */
        match(code) {
          return false;
        }
        /** @param {Object} item - 数据项 @param {string} code - 原始指令码 @returns {boolean} */
        execute(item, code) {
          return false;
        }
      }

      // --- 1. 特殊指令 (优先级 100 - 最高) ---

      /**
       * 国际航班
       */
      class IntlCommand extends Command {
        constructor() {
          super(100);
        }
        match(code) {
          return code === "INTL";
        }
        execute(item) {
          return item.isInternational === true;
        }
      }

      /**
       * 取消航班
       */
      class CnlCommand extends Command {
        constructor() {
          super(100);
        }
        match(code) {
          return code === "CNL";
        }
        execute(item) {
          return item.status === "CANCELLED";
        }
      }

      /**
       * 宽体机
       */
      class WideCommand extends Command {
        constructor() {
          super(100);
        }
        match(code) {
          return code === "WIDE";
        }
        execute(item) {
          return item.wideBody === true;
        }
      }

      // --- 2. 动态参数指令 (优先级 50 - 中等) ---
      class AirportCommand extends Command {
        constructor() {
          super(50);
        }
        match(code) {
          return /^(-?)([A-Z]{3})(-?)$/.test(code);
        }
        execute(item, code) {
          const airportCode = code.replace(/-/g, "");
          let direction = "BOTH";
          if (code.endsWith("-")) direction = "DEPARTURE";
          else if (code.startsWith("-")) direction = "ARRIVAL";

          if (direction === "BOTH")
            return (
              item.departure === airportCode || item.arrival === airportCode
            );
          if (direction === "DEPARTURE") return item.departure === airportCode;
          if (direction === "ARRIVAL") return item.arrival === airportCode;
          return false;
        }
      }

      /**
       * 时长筛选
       */
      class DurationCommand extends Command {
        constructor() {
          super(50);
        }
        match(code) {
          // 匹配规则：以 DUR< 开头，后面跟数字
          const PATTERN = /^DUR<\d+$/;
          return /^DUR<\d+$/.test(code);
        }
        execute(item, code) {
          const limit = parseInt(code.split("<")[1], 10); // 提取数字
          return item.duration <= limit;
        }
      }

      /**
       * 飞机号
       * 支持格式: B123A, B-123A, 123A
       * 匹配规则: 飞机号以 B- 开头的去掉 B- 比较，否则去掉 B 比较
       */
      class AircraftNoCommand extends Command {
        constructor() {
          super(50);
        }
        match(code) {
          // 匹配格式: B开头后跟4-5位字母数字，或者纯4-5位字母数字
          const PATTERN = /^(B-?[A-Z0-9]{4,5}|[A-Z0-9]{4,5})$/i;
          return PATTERN.test(code);
        }
        execute(item, code) {
          const normalize = (s) => {
            const cleaned = s.replace(/-/g, "").toUpperCase();
            return cleaned.startsWith("B") ? cleaned.substring(1) : cleaned;
          };
          const target = normalize(item.regNo || "");
          const query = normalize(code);
          return target === query;
        }
      }

      // --- 3. 兜底指令 (优先级 10 - 最低) ---

      /**
       * 航班号
       * 支持格式: MU1234, 1234
       */
      class FlightNoCommand extends Command {
        constructor() {
          super(10);
        }
        match(code) {
          // 匹配规则: 2位航空公司代码 + 3-4位数字，或纯数字
          const PATTERN = /^([A-Z]{2})?(\d{3,4})$/i;
          return PATTERN.test(code);
        }
        execute(item, code) {
          return (item.flightNo || "").includes(code);
        }
      }

      /**
       * 航班搜索核心引擎
       */
      class FlightSearchEngine {
        constructor() {
          this.commands = [];
        }

        /**
         * 注册指令实例
         */
        register(command) {
          this.commands.push(command);
        }

        /**
         * 解析字符串为逻辑结构
         * 规则：逗号(,)是或，星号(*)是且，感叹号(!)是非
         */
        _parseKeyword(keyword) {
          const orGroups = keyword.split(",");

          return orGroups.map((group) => {
            const andTokens = group.split("*");
            return andTokens.map((token) => {
              const isNegation = token.startsWith("!");
              const rawCode = isNegation ? token.substring(1) : token;

              // 按优先级排序，找出匹配的最高优先级指令
              const sorted = [...this.commands].sort(
                (a, b) => b.priority - a.priority,
              );
              const matched = sorted.find((cmd) => cmd.match(rawCode)) || null;

              return {
                command: matched,
                code: rawCode,
                negate: isNegation,
              };
            });
          });
        }

        /**
         * 评估单个数据项是否匹配逻辑
         */
        _evaluateLogic(item, logicGroups) {
          // 逻辑结构：[[A, B], [C]] => (A且B) 或 (C)
          return logicGroups.some((andGroup) => {
            return andGroup.every((condition) => {
              const { command, code, negate } = condition;
              if (!command) return false;
              const result = command.execute(item, code);
              return negate ? !result : result;
            });
          });
        }

        /**
         * 主搜索函数
         */
        search(keyword, data, options = {}) {
          if (!keyword || typeof keyword !== "string" || !keyword.trim()) {
            return data;
          }

          const cleanKeyword = keyword.trim().toUpperCase();
          const logicGroups = this._parseKeyword(cleanKeyword);
          const filterItem = (item) => this._evaluateLogic(item, logicGroups);

          return {
            flightList: data.filter(filterItem),
          };
        }
      }

      // 初始化引擎
      const engine = new FlightSearchEngine();

      // 指令注册
      engine.register(new IntlCommand());
      engine.register(new CnlCommand());
      engine.register(new WideCommand());
      engine.register(new AirportCommand());
      engine.register(new DurationCommand());
      engine.register(new AircraftNoCommand());
      engine.register(new FlightNoCommand());

      const mockData = [
        { id: "1", flightNo: "MU5102", departure: "PVG", arrival: "NRT", regNo: "B0001", wideBody: true, duration: 3, status: "SCHEDULED" },
        { id: "2", flightNo: "FM9101", departure: "SHA", arrival: "PEK", regNo: "B0002", wideBody: false, duration: 2.5, status: "CANCELLED" },
        { id: "3", flightNo: "CA1234", departure: "PEK", arrival: "LAX", regNo: "B0003", wideBody: true, duration: 12, status: "SCHEDULED" },
        { id: "4", flightNo: "HO1111", departure: "SHA", arrival: "HKG", regNo: "B0004", wideBody: true, duration: 2, status: "CANCELLED" },
        { id: "5", flightNo: "FM9313", departure: "SHA", arrival: "CAN", wideBody: false, regNo: "B5969", duration: 12, status: "SCHEDULED" },
        { id: "6", flightNo: "MU5969", departure: "KMG", arrival: "ZAT", regNo: "B6142", wideBody: false, duration: 12, status: "SCHEDULED" },
      ];

      // 测试 1: 使用简单自定义指令 WIDE
      console.log("--- 测试1 WIDE ---", "预计输出: ['1', '3', '4']");
      const r1 = engine.search("WIDE", mockData);
      console.log(r1.flightList.map((f) => f.id));

      // 测试 2: 使用高级自定义指令 DUR<3 (时长小于3小时)
      console.log("--- 测试2 DUR<3 ---", "预计输出: ['1', '2', '4']");
      const r2 = engine.search("DUR<3", mockData);
      console.log(r2.flightList.map((f) => f.id));

      // 测试 3: 组合使用 (宽体机 且 时长小于10小时)
      console.log("--- 测试3 WIDE*DUR<10 ---", "预计输出: ['1', '4']");
      const r3 = engine.search("WIDE*DUR<10", mockData);
      console.log(r3.flightList.map((f) => f.id));

      // 测试 4: 组合原有指令 (SHA起飞 且 宽体机)
      console.log("--- 测试4 SHA-*WIDE ---", "预计输出: ['4']");
      const r4 = engine.search("SHA-*WIDE", mockData);
      console.log(r4.flightList.map((f) => f.id));
      // 测试 5: 组合原有指令 (SHA起飞 且 宽体机 或 PVG起飞 )
      console.log("--- 测试5 SHA-*WIDE,PVG- ---", "预计输出: ['1', '4']");
      const r5 = engine.search("SHA-*WIDE,PVG-", mockData);
      console.log(r5.flightList.map((f) => f.id));

      // 测试 6: 航班号查询
      console.log("--- 测试6 MU5102 ---", "预计输出: ['1']");
      const r6 = engine.search("MU5102", mockData);
      console.log(r6.flightList.map((f) => f.id));

      // 测试 7: 取消航班
      console.log("--- 测试7 CNL ---", "预计输出: ['2', '4']");
      const r7 = engine.search("CNL", mockData);
      console.log(r7.flightList.map((f) => f.id));

      // 测试 8: 取消航班 且 SHA起飞
      console.log("--- 测试8 CNL*SHA- ---", "预计输出: ['2', '4']");
      const r8 = engine.search("CNL*SHA-", mockData);
      console.log(r8.flightList.map((f) => f.id));

      // 测试 9: 非取消航班
      console.log("--- 测试9 !CNL ---", "预计输出: ['1', '3', '5', '6']");
      const r9 = engine.search("!CNL", mockData);
      console.log(r9.flightList.map((f) => f.id));

      // 测试 10: 飞机号(完整B前缀)
      console.log("--- 测试10 B5969 ---", "预计输出: ['5']");
      const r10 = engine.search("B5969", mockData);
      console.log(r10.flightList.map((f) => f.id));

      // 测试 11: 飞机号(不带B前缀)
      console.log("--- 测试11 5969 ---", "预计输出: ['5']");
      const r11 = engine.search("5969", mockData);
      console.log(r11.flightList.map((f) => f.id));

      // 测试 12: 飞机号 或 航班号
      console.log("--- 测试12 B6142,MU5102 ---", "预计输出: ['1', '6']");
      const r12 = engine.search("B6142,MU5102", mockData);
      console.log(r12.flightList.map((f) => f.id));
    </script>
  </body>
</html>
